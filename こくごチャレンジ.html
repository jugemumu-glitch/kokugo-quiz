<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>国語チャレンジ！ 5年生</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap');
  :root{--sky:#b45309;--sun:#f59e0b;--earth:#059669;--red:#dc2626;--accent:#d97706;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:linear-gradient(160deg,#1c0a00 0%,#431407 55%,#7c2d12 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,.4) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 55% 10%,rgba(255,255,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 75% 25%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(1px 1px at 85% 70%,rgba(255,255,255,.4) 0%,transparent 100%);pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;width:100%;max-width:540px;}
  .header{text-align:center;margin-bottom:20px;}
  .header h1{font-family:'Kaisei Decol',serif;font-size:clamp(1.6rem,6vw,2.2rem);color:#fff;text-shadow:0 0 20px rgba(180,83,9,.9),0 2px 4px rgba(0,0,0,.5);letter-spacing:.05em;}
  .header .sub{font-size:.85rem;color:#fcd34d;margin-top:4px;letter-spacing:.1em;}
  .status-bar{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:10px 18px;margin-bottom:20px;backdrop-filter:blur(10px);}
  .stat-item{display:flex;align-items:center;gap:6px;color:#fef3c7;font-size:.85rem;font-weight:700;}
  .stat-icon{font-size:1.1rem;}
  .stat-val{color:#fbbf24;font-size:1rem;}
  .divider{width:1px;height:20px;background:rgba(255,255,255,.2);}
  .progress-wrap{flex:1;}
  .progress-bar-bg{height:8px;background:rgba(255,255,255,.15);border-radius:50px;overflow:hidden;}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,#b45309,#f59e0b);border-radius:50px;transition:width .4s cubic-bezier(.4,0,.2,1);}
  .card{background:rgba(255,251,235,.97);border-radius:24px;padding:28px 24px;box-shadow:0 8px 40px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.2);animation:cardIn .35s cubic-bezier(.4,0,.2,1);}
  @keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  .q-meta{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .q-badge{background:#b45309;color:#fff;font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:50px;letter-spacing:.08em;}
  .q-badge.text-type{background:#0369a1;}
  .q-num{font-size:.82rem;color:#64748b;margin-left:auto;font-weight:700;}
  .question-text{font-size:clamp(.95rem,3.2vw,1.08rem);font-weight:700;color:#1c0a00;line-height:1.85;margin-bottom:20px;}
  .question-text ruby{ruby-align:center;}
  .question-text rt{font-size:.55em;color:#92400e;font-weight:400;}
  .kanji-box{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#1c0a00;text-align:center;padding:16px;background:#fef3c7;border-radius:16px;margin-bottom:8px;letter-spacing:.2em;}
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice-btn{width:100%;padding:13px 16px;border:2px solid #fde68a;border-radius:14px;background:#fff;color:#1c0a00;font-family:'Noto Sans JP',sans-serif;font-size:.95rem;font-weight:700;text-align:left;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:10px;}
  .choice-btn:hover:not(:disabled){border-color:#b45309;background:#fef3c7;transform:translateX(4px);}
  .choice-btn.correct{border-color:var(--earth);background:#d1fae5;color:var(--earth);}
  .choice-btn.wrong{border-color:var(--red);background:#fee2e2;color:var(--red);}
  .choice-btn:disabled{cursor:default;}
  .choice-label{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#fde68a;font-size:.78rem;font-weight:900;flex-shrink:0;transition:background .18s;}
  .choice-btn.correct .choice-label{background:var(--earth);color:#fff;}
  .choice-btn.wrong .choice-label{background:var(--red);color:#fff;}
  .text-input-wrap{display:flex;flex-direction:column;gap:10px;}
  .text-input{width:100%;padding:13px 16px;border:2px solid #fde68a;border-radius:14px;font-family:'Noto Sans JP',sans-serif;font-size:1.1rem;font-weight:700;color:#1c0a00;outline:none;transition:border-color .18s;text-align:center;}
  .text-input:focus{border-color:#b45309;}
  .text-input.correct{border-color:var(--earth);background:#d1fae5;}
  .text-input.wrong{border-color:var(--red);background:#fee2e2;}
  .submit-btn{padding:13px;border:none;border-radius:14px;background:linear-gradient(135deg,#b45309,#92400e);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 14px rgba(180,83,9,.4);}
  .submit-btn:hover:not(:disabled){transform:translateY(-2px);}
  .submit-btn:disabled{background:#94a3b8;box-shadow:none;cursor:default;}
  .feedback{margin-top:14px;padding:12px 16px;border-radius:12px;font-size:.9rem;font-weight:700;line-height:1.7;display:none;}
  .feedback.show{display:block;animation:fadeIn .25s;}
  .feedback.correct-fb{background:#d1fae5;color:#065f46;border-left:4px solid var(--earth);}
  .feedback.wrong-fb{background:#fee2e2;color:#991b1b;border-left:4px solid var(--red);}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .back-btn{margin-top:12px;width:100%;padding:10px;border:2px dashed #fca5a5;border-radius:14px;background:transparent;color:#dc2626;font-family:'Noto Sans JP',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .18s;display:none;}
  .back-btn.show{display:block;animation:fadeIn .25s;}
  .back-btn:hover{background:#fff1f2;border-color:#dc2626;}
  .skip-btn{margin-top:10px;width:100%;padding:10px;border:2px dashed #cbd5e1;border-radius:14px;background:transparent;color:#94a3b8;font-family:'Noto Sans JP',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .18s;}
  .skip-btn:hover{background:#f8fafc;border-color:#94a3b8;color:#64748b;}
  .skip-btn:disabled{opacity:.3;cursor:default;}
  .teach-btn{margin-top:12px;width:100%;padding:11px;border:2px dashed #6ee7b7;border-radius:14px;background:transparent;color:#059669;font-family:'Noto Sans JP',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .18s;}
  .teach-btn:hover:not(:disabled){background:#ecfdf5;border-color:#059669;}
  .teach-btn:disabled{opacity:.4;cursor:default;}
  .teach-area{margin-top:10px;padding:14px 16px;border-radius:12px;background:#ecfdf5;border-left:4px solid var(--earth);color:#065f46;font-size:.9rem;font-weight:700;line-height:1.9;display:none;}
  .teach-area.show{display:block;animation:fadeIn .25s;}
  .next-btn{margin-top:16px;width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:900;cursor:pointer;letter-spacing:.05em;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(245,158,11,.4);display:none;}
  .next-btn.show{display:block;animation:fadeIn .3s .1s both;}
  .next-btn:hover{transform:translateY(-2px);}
  .result-screen{display:none;text-align:center;padding:10px 0;}
  .result-screen.show{display:block;animation:cardIn .4s;}
  .result-trophy{font-size:4rem;margin-bottom:10px;}
  .result-title{font-family:'Kaisei Decol',serif;font-size:1.8rem;color:#1c0a00;font-weight:700;margin-bottom:6px;}
  .result-score{font-size:1rem;color:#475569;margin-bottom:20px;}
  .result-score strong{color:var(--earth);font-size:1.4rem;}
  .point-badge{display:inline-block;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:1.5rem;font-weight:900;padding:14px 36px;border-radius:50px;box-shadow:0 6px 24px rgba(245,158,11,.5);margin-bottom:24px;animation:pulse 1.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .point-note{font-size:.85rem;color:#64748b;margin-bottom:24px;}
  .restart-btn{padding:14px 40px;border:none;border-radius:50px;background:linear-gradient(135deg,#b45309,#92400e);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(180,83,9,.4);transition:transform .15s;}
  .restart-btn:hover{transform:translateY(-2px);}
  .start-screen{text-align:center;padding:10px 0;}
  .start-screen .hero-icon{font-size:4rem;margin-bottom:12px;}
  .start-screen h2{font-family:'Kaisei Decol',serif;font-size:1.5rem;color:#1c0a00;margin-bottom:10px;}
  .rule-list{text-align:left;background:#fef3c7;border-radius:14px;padding:14px 18px;margin-bottom:24px;}
  .rule-list li{font-size:.88rem;color:#334155;line-height:2;list-style:none;padding-left:4px;}
  .start-btn{padding:15px 50px;border:none;border-radius:50px;background:linear-gradient(135deg,#b45309,#92400e);color:#fff;font-family:'Noto Sans JP',sans-serif;font-size:1.1rem;font-weight:900;cursor:pointer;box-shadow:0 6px 24px rgba(180,83,9,.5);letter-spacing:.08em;transition:transform .15s;}
  .start-btn:hover{transform:translateY(-2px);}
  .history-section{margin-top:20px;text-align:left;}
  .history-title{font-size:.8rem;font-weight:700;color:#b45309;margin-bottom:8px;letter-spacing:.08em;}
  .history-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;}
  .history-item{display:flex;align-items:center;justify-content:space-between;background:#fef3c7;border-radius:10px;padding:8px 12px;font-size:.82rem;}
  .history-date{color:#64748b;font-weight:700;}
  .history-score{font-weight:900;color:#b45309;}
  .history-pts{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:.72rem;font-weight:900;padding:2px 8px;border-radius:50px;}
  .history-empty{font-size:.82rem;color:#94a3b8;text-align:center;padding:12px 0;}
  .history-clear{margin-top:8px;width:100%;padding:7px;border:1px solid #fde68a;border-radius:10px;background:transparent;color:#94a3b8;font-family:'Noto Sans JP',sans-serif;font-size:.75rem;font-weight:700;cursor:pointer;}
  .history-clear:hover{color:#dc2626;border-color:#fca5a5;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>📖 国語チャレンジ！</h1>
    <div class="sub">小学5年生 · 漢字・文章問題</div>
  </div>
  <div class="card" id="startScreen">
    <div class="start-screen">
      <div class="hero-icon">✏️</div>
      <h2>ルール説明</h2>
      <ul class="rule-list">
        <li>🎯 全部で <strong>30問</strong> 出題されます（100問以上からランダム！）</li>
        <li>✅ 全問正解すると <strong>50ポイント</strong> もらえます</li>
        <li>❌ 不正解でも次の問題に進めます</li>
        <li>↩ 「もどる」ボタンで前の問題にもどれます</li>
        <li>⏭ わからない問題はスキップできます</li>
        <li>📖 「おしえて！」ボタンで解説が見られます</li>
      </ul>
      <button class="start-btn" onclick="startQuiz()">スタート！</button>
      <div class="history-section">
        <div class="history-title">📋 これまでの記録</div>
        <div class="history-list" id="historyList"></div>
        <button class="history-clear" onclick="clearHistory()">🗑 記録をリセット</button>
      </div>
    </div>
  </div>
  <div id="quizArea" style="display:none;">
    <div class="status-bar">
      <div class="stat-item"><span class="stat-icon">✅</span><span>正解</span><span class="stat-val" id="correctCount">0</span></div>
      <div class="divider"></div>
      <div class="stat-item"><span class="stat-icon">⭐</span><span>PT</span><span class="stat-val" id="pointCount">0</span></div>
      <div class="divider"></div>
      <div class="progress-wrap"><div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div></div>
      <div class="stat-item"><span class="stat-val" id="qProgress">0/30</span></div>
    </div>
    <div class="card" id="quizCard">
      <div class="q-meta">
        <span class="q-badge" id="qTypeBadge">漢字</span>
        <span class="q-num" id="qNumLabel">第 1 問</span>
      </div>
      <div class="kanji-box" id="kanjiBox" style="display:none;"></div>
      <div class="question-text" id="questionText"></div>
      <div class="choices" id="choicesArea" style="display:none;"></div>
      <div class="text-input-wrap" id="textInputArea" style="display:none;">
        <input class="text-input" id="textInput" type="text" placeholder="答えを入力してください" autocomplete="off">
        <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">答える ✓</button>
      </div>
      <button class="back-btn" id="backBtn" onclick="goBack()">↩ 前の問題にもどる</button>
      <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">⏭ この問題をスキップする</button>
      <button class="teach-btn" id="teachBtn" onclick="showTeach()">🙋 おしえて！</button>
      <div class="teach-area" id="teachArea"></div>
      <div class="feedback" id="feedbackArea"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">次の問題へ →</button>
    </div>
  </div>
  <div class="card" id="resultScreen" style="display:none;">
    <div class="result-screen show">
      <div class="result-trophy" id="resultTrophy">🏆</div>
      <div class="result-title" id="resultTitle">おめでとう！</div>
      <div class="result-score" id="resultScore"></div>
      <div class="point-badge" id="pointBadge">＋50 ポイント！</div>
      <div class="point-note" id="pointNote"></div>
      <div class="point-note" id="totalPtNote" style="font-weight:900;color:#b45309;font-size:.95rem;margin-top:-10px;margin-bottom:16px;"></div>
      <button class="restart-btn" onclick="restartQuiz()">もう一度チャレンジ！</button>
    </div>
  </div>
</div>
<script>
const ALL_QUESTIONS = [
  // ===== 漢字の読み =====
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「永久」の読み方はどれですか？',choices:['えいきゅう','ながひさ','えいご','とわ'],ans:0,explain:'「永久（えいきゅう）」は「いつまでも続くこと」という意味だよ。「永」はながい、「久」はひさしいという意味を持つ漢字なんだ。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「境界」の読み方はどれですか？',choices:['さかいめ','きょうかい','ことさか','せいかい'],ans:1,explain:'「境界（きょうかい）」は「さかい目」「区切り」という意味だよ。「境」はさかいという意味で、「境界線（きょうかいせん）」のように使うね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「快適」の読み方はどれですか？',choices:['はやてき','かいてき','こころよし','きもちよい'],ans:1,explain:'「快適（かいてき）」は「気持ちよく過ごせること」という意味だよ。「快」は気持ちよい、「適」はぴったりという意味を持つんだ。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「効果」の読み方はどれですか？',choices:['こうか','きかめ','ためし','さんか'],ans:0,explain:'「効果（こうか）」は「ねらった通りのよい結果が出ること」という意味だよ。「効果的（こうかてき）」のように使うね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「限界」の読み方はどれですか？',choices:['かぎり','かいけん','げんかい','さかいめ'],ans:2,explain:'「限界（げんかい）」は「これ以上はできない、という限り」という意味だよ。「限」はかぎる、「界」はさかいという意味を持つんだ。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「情報」の読み方はどれですか？',choices:['なさけほう','じょうほう','こころはら','じゅうほう'],ans:1,explain:'「情報（じょうほう）」は「役に立つ知らせや知識」のことだよ。「情」はようす・こころ、「報」はしらせるという意味を持つんだ。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「現在」の読み方はどれですか？',choices:['あらわれ','げんざい','みえる','うつつ'],ans:1,explain:'「現在（げんざい）」は「今この時」という意味だよ。「現」はあらわれる・いまという意味で、「過去・現在・未来」の「現在」だね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「資源」の読み方はどれですか？',choices:['もとで','しげん','ちから','たすけ'],ans:1,explain:'「資源（しげん）」は「産業や生活に役立つ自然のもと」のことだよ。石油・石炭・森林などが資源と呼ばれるんだ。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「保護」の読み方はどれですか？',choices:['たもつ','ほご','ふせぎ','まもり'],ans:1,explain:'「保護（ほご）」は「守り助けること」という意味だよ。「自然保護（しぜんほご）」「保護者（ほごしゃ）」のように使うね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「貿易」の読み方はどれですか？',choices:['ものうり','ぼうえき','とりひき','こうかん'],ans:1,explain:'「貿易（ぼうえき）」は「外国と物を売ったり買ったりすること」だよ。「輸出（ゆしゅつ）」「輸入（ゆにゅう）」が貿易の一部なんだ。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「可能」の読み方はどれですか？',choices:['かもく','かのう','よしあし','できる'],ans:1,explain:'「可能（かのう）」は「できること・やれること」という意味だよ。「不可能（ふかのう）」はできないこと、という意味になるね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「規則」の読み方はどれですか？',choices:['きそく','おきて','ならい','てきそく'],ans:0,explain:'「規則（きそく）」は「みんなが守らなければならない決まり」のことだよ。「規則正しい生活」のように使うね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「態度」の読み方はどれですか？',choices:['ようす','たいど','きもち','ものごし'],ans:1,explain:'「態度（たいど）」は「ものごとへの接し方・ふるまい」のことだよ。「礼儀正しい態度」などのように使うね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「往復」の読み方はどれですか？',choices:['おうふく','いきかえり','ゆきもどり','かんふく'],ans:0,explain:'「往復（おうふく）」は「行って帰ること」という意味だよ。「往復乗車券（おうふくじょうしゃけん）」のように使うね。'},
  {type:'choice',cat:'漢字の読み',kanji:'',q:'「独立」の読み方はどれですか？',choices:['ひとり','どくりつ','じりつ','たちまち'],ans:1,explain:'「独立（どくりつ）」は「他に頼らず自分の力だけで立つこと」という意味だよ。「独立国家」のように国が他の国に支配されていない状態も表すよ。'},
  // ===== 漢字の書き（読みがなから漢字） =====
  {type:'text',cat:'漢字の書き',kanji:'',q:'「えいきゅう」を漢字で書きなさい。',ans:['永久'],explain:'「永久（えいきゅう）」は「永」（ながい・とこしえ）と「久」（ひさしい）で「いつまでも続く」という意味だよ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「かいてき」を漢字で書きなさい。',ans:['快適'],explain:'「快適（かいてき）」は「快」（こころよい）と「適」（ちょうどよい）で「気持ちよく過ごせる」という意味だよ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「じょうほう」を漢字で書きなさい。',ans:['情報'],explain:'「情報（じょうほう）」は「情」（ようす・こころ）と「報」（しらせる）で「役に立つ知らせ」という意味だよ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「げんかい」を漢字で書きなさい。',ans:['限界'],explain:'「限界（げんかい）」は「限」（かぎる）と「界」（さかい）で「これ以上はできない限り」という意味だよ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「ぼうえき」を漢字で書きなさい。',ans:['貿易'],explain:'「貿易（ぼうえき）」は外国と物を売ったり買ったりすることだよ。「貿」も「易」も「交換する・交わる」という意味を持つんだ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「しげん」を漢字で書きなさい。',ans:['資源'],explain:'「資源（しげん）」の「資」は「もととなるもの」、「源」は「みなもと」という意味だよ。石油・石炭・水などが代表的な資源だ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「かのう」を漢字で書きなさい。',ans:['可能'],explain:'「可能（かのう）」の「可」は「よろしい・できる」、「能」は「できる・ちから」という意味だよ。「不可能（ふかのう）」と対になる言葉だね。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「どくりつ」を漢字で書きなさい。',ans:['独立'],explain:'「独立（どくりつ）」の「独」は「ひとり」、「立」は「たつ」という意味だよ。他に頼らず自分の力で立つということだ。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「きそく」を漢字で書きなさい。',ans:['規則'],explain:'「規則（きそく）」の「規」は「きまり・のり」、「則」も「きまり・のっとる」という意味だよ。みんなが守る決まりのことだね。'},
  {type:'text',cat:'漢字の書き',kanji:'',q:'「こうか」を漢字で書きなさい。（ねらった結果が出ること）',ans:['効果'],explain:'「効果（こうか）」の「効」は「きく・ためになる」、「果」は「はたす・けっか」という意味だよ。「効果的」のように使うね。'},
  // ===== 漢字の部首・画数 =====
  {type:'choice',cat:'漢字の知識',kanji:'',q:'「林」の部首はどれですか？',choices:['木','口','日','土'],ans:0,explain:'「林」の部首は「木（きへん・き）」だよ。木が2つ並んで「林（はやし）」という字ができているんだ。木が3つで「森（もり）」になるよ。'},
  {type:'choice',cat:'漢字の知識',kanji:'',q:'「語」の部首はどれですか？',choices:['口','言','五','吾'],ans:1,explain:'「語」の部首は「言（ごんべん）」だよ。「話・読・詩・誌・語」など、言葉に関係する漢字には「言（ごんべん）」がつくんだ。'},
  {type:'choice',cat:'漢字の知識',kanji:'',q:'「海」の部首はどれですか？',choices:['毎','母','水','氵'],ans:3,explain:'「海」の部首は「氵（さんずい）」だよ。水に関係する漢字には「氵」がつくことが多いんだ。「川・池・泳・波・流」なども同じだよ。'},
  {type:'choice',cat:'漢字の知識',kanji:'',q:'次の漢字の中で、画数が一番多いのはどれですか？',choices:['日','月','木','森'],ans:3,explain:'「森」は12画で一番多いよ。「日」は4画、「月」は4画、「木」は4画だ。「木」が3つ集まった「森」は画数も3倍になるんだね。'},
  {type:'choice',cat:'漢字の知識',kanji:'',q:'「花」の部首はどれですか？',choices:['草','艹','化','人'],ans:1,explain:'「花」の部首は「艹（くさかんむり）」だよ。草や植物に関係する漢字には「艹」がつくことが多いんだ。「草・茶・菜・葉・芽」なども同じだよ。'},
  // ===== ことわざ・慣用句 =====
  {type:'choice',cat:'ことわざ',kanji:'',q:'「石の上にも三年」の意味はどれですか？',choices:['石は三年で動く','つらくても辛抱して続ければ成功する','石は三年で変わる','三年間は石に座れ'],ans:1,explain:'「石の上にも三年」は「つらいことでも辛抱強く続ければ、やがて成果が出る」という意味のことわざだよ。石は冷たくて座り心地が悪いけど、三年も座れば温まる、ということから生まれた言葉なんだ。'},
  {type:'choice',cat:'ことわざ',kanji:'',q:'「七転び八起き」の意味はどれですか？',choices:['七回転んで八回起きる','何度失敗してもあきらめずに立ち上がる','転んだら必ず起きる','七と八の間で転ぶ'],ans:1,explain:'「七転び八起き（ななころびやおき）」は「何度失敗してもくじけずに立ち上がる」という意味だよ。転んだ回数より起きた回数が一つ多いのがポイントなんだ。'},
  {type:'choice',cat:'ことわざ',kanji:'',q:'「急がば回れ」の意味はどれですか？',choices:['急いで近道を通れ','急ぐときほど安全な道を選んだほうがよい','急いだらまわりを見ろ','急ぐと道に迷う'],ans:1,explain:'「急がば回れ」は「急いでいるときほど、危険な近道より安全な遠回りをしたほうが、結果的に早く着く」という意味のことわざだよ。'},
  {type:'choice',cat:'ことわざ',kanji:'',q:'「猿も木から落ちる」の意味はどれですか？',choices:['猿は木が好きだ','木登りが得意な猿でも落ちることがある＝どんな名人でも失敗する','猿は落ちやすい','木から猿が落ちた'],ans:1,explain:'「猿も木から落ちる」は「どんな得意なことでも、時には失敗することがある」という意味のことわざだよ。名人・達人でも失敗することのたとえとして使われるんだ。'},
  {type:'choice',cat:'ことわざ',kanji:'',q:'「百聞は一見にしかず」の意味はどれですか？',choices:['百回聞くと一回見える','百回聞くよりも、一度自分の目で見るほうがよくわかる','見るより聞くほうが大切だ','百回見ると一回聞こえる'],ans:1,explain:'「百聞は一見にしかず（ひゃくぶんはいっけんにしかず）」は「百回人から聞くよりも、自分で一度実際に見るほうがよくわかる」という意味だよ。体験することの大切さを教えてくれることわざだね。'},
  {type:'choice',cat:'ことわざ',kanji:'',q:'「二兎を追う者は一兎をも得ず」の意味はどれですか？',choices:['うさぎは二匹がよい','二つのことを同時にやろうとすると、どちらも成功しない','うさぎは一匹でよい','二匹追えば一匹捕まえられる'],ans:1,explain:'「二兎を追う者は一兎をも得ず（にとをおうものはいっとをもえず）」は「二つのことを同時にしようとすると、どちらも失敗する」という意味だよ。「一度に二つのことを追いかけるな」という教えなんだ。'},
  {type:'choice',cat:'ことわざ',kanji:'',q:'「転ばぬ先の杖」の意味はどれですか？',choices:['転んだら杖をつけ','失敗してから反省する','失敗しないよう前もって準備しておく','杖があれば転ばない'],ans:2,explain:'「転ばぬ先の杖（ころばぬさきのつえ）」は「失敗や危険が起こる前に、あらかじめ準備しておくことが大切だ」という意味のことわざだよ。'},
  {type:'choice',cat:'慣用句',kanji:'',q:'「頭が上がらない」の意味はどれですか？',choices:['頭が重い','相手に対してひけめを感じて、堂々とできない','頭を高く上げられない','頭が低い'],ans:1,explain:'「頭が上がらない」は「相手に対して引け目を感じて、対等にふるまうことができない」という意味の慣用句だよ。お世話になった人に対してよく使うんだ。'},
  {type:'choice',cat:'慣用句',kanji:'',q:'「手を焼く」の意味はどれですか？',choices:['手が熱くなる','あつかいに困る・もてあます','手で焼く','手がやけどする'],ans:1,explain:'「手を焼く（てをやく）」は「あつかいに困る・もてあます」という意味の慣用句だよ。「あの子には本当に手を焼いた」のように使うんだ。'},
  {type:'choice',cat:'慣用句',kanji:'',q:'「気が置けない」の意味はどれですか？',choices:['気をつける必要がある','心を許せて遠慮がいらない','気が合わない','気にしなくてよい'],ans:1,explain:'「気が置けない（きがおけない）」は「遠慮しなくてよい・気心が知れた」という意味の慣用句だよ。「気が置けない友人」はとても親しい友人ということだ。'},
  {type:'choice',cat:'慣用句',kanji:'',q:'「胸を張る」の意味はどれですか？',choices:['胸を前に出す','自信を持って堂々とする','胸が痛くなる','胸がはちきれそうになる'],ans:1,explain:'「胸を張る（むねをはる）」は「自信を持って堂々とした態度をとる」という意味の慣用句だよ。「胸を張って言える」のように使うんだ。'},
  {type:'choice',cat:'慣用句',kanji:'',q:'「骨を折る」の意味はどれですか？',choices:['骨が折れる','苦労して力を尽くす','骨が折れるほど働く','骨格が変わる'],ans:1,explain:'「骨を折る（ほねをおる）」は「苦労して力を尽くす・一生懸命努力する」という意味の慣用句だよ。「骨折り損のくたびれもうけ」という表現もあるよ。'},
  // ===== 文法・語句 =====
  {type:'choice',cat:'文法',kanji:'',q:'「美しい花が咲いた。」の「美しい」は何ですか？',choices:['動詞','形容詞','名詞','副詞'],ans:1,explain:'「美しい」は「形容詞（けいようし）」だよ。「い」で終わる、ものの様子や状態を表す言葉が形容詞なんだ。「大きい・小さい・楽しい」なども形容詞だよ。'},
  {type:'choice',cat:'文法',kanji:'',q:'「静かな教室」の「静かな」は何ですか？',choices:['形容詞','動詞','形容動詞','副詞'],ans:2,explain:'「静かな」は「形容動詞（けいようどうし）」だよ。「な」や「だ」「です」で終わるものの様子を表す言葉だよ。「きれいな・有名な・元気な」なども形容動詞だね。'},
  {type:'choice',cat:'文法',kanji:'',q:'「ゆっくり歩く」の「ゆっくり」は何ですか？',choices:['名詞','形容詞','動詞','副詞'],ans:3,explain:'「ゆっくり」は「副詞（ふくし）」だよ。動詞や形容詞をくわしくする言葉が副詞なんだ。「もっと・たくさん・すっかり・かなり」なども副詞だよ。'},
  {type:'choice',cat:'文法',kanji:'',q:'「走る・食べる・見る」はどんな品詞ですか？',choices:['名詞','形容詞','動詞','副詞'],ans:2,explain:'「走る・食べる・見る」はすべて「動詞（どうし）」だよ。動作や存在を表す言葉で、「〜する」「〜ある」「〜いる」の形になるものが動詞なんだ。'},
  {type:'choice',cat:'文法',kanji:'',q:'「が・は・を・に・で・と」などの言葉は何といいますか？',choices:['接続詞','助詞','副詞','形容詞'],ans:1,explain:'「が・は・を・に・で・と・へ・から・まで」などは「助詞（じょし）」だよ。言葉と言葉をつなぎ、意味の関係を示す言葉なんだ。'},
  {type:'choice',cat:'文法',kanji:'',q:'「しかし・だから・また・つまり」などの言葉は何といいますか？',choices:['助詞','副詞','接続詞','感動詞'],ans:2,explain:'「しかし・だから・また・つまり・そして」などは「接続詞（せつぞくし）」だよ。文と文、言葉と言葉をつなぐ役割があるんだ。'},
  {type:'choice',cat:'文法',kanji:'',q:'「山・川・海・学校」などのような言葉を何といいますか？',choices:['動詞','名詞','形容詞','副詞'],ans:1,explain:'「山・川・海・学校・先生・友達」などは「名詞（めいし）」だよ。ものや人・場所・ことがらの名前を表す言葉が名詞なんだ。'},
  // ===== 類義語・対義語 =====
  {type:'choice',cat:'類義語・対義語',kanji:'',q:'「出発」の対義語はどれですか？',choices:['スタート','到着','旅行','移動'],ans:1,explain:'「出発（しゅっぱつ）」の対義語は「到着（とうちゃく）」だよ。「出発」はどこかへ向かって旅立つこと、「到着」は目的地に着くことだ。'},
  {type:'choice',cat:'類義語・対義語',kanji:'',q:'「増加」の対義語はどれですか？',choices:['成長','減少','変化','大量'],ans:1,explain:'「増加（ぞうか）」の対義語は「減少（げんしょう）」だよ。「増加」は増えること、「減少」は減ることだ。'},
  {type:'choice',cat:'類義語・対義語',kanji:'',q:'「原因」の対義語はどれですか？',choices:['理由','もとで','結果','経緯'],ans:2,explain:'「原因（げんいん）」の対義語は「結果（けっか）」だよ。「原因」は何かが起こる理由・もとになること、「結果」はそこから生じた状態だ。'},
  {type:'choice',cat:'類義語・対義語',kanji:'',q:'「賛成」の対義語はどれですか？',choices:['同意','支持','反対','協力'],ans:2,explain:'「賛成（さんせい）」の対義語は「反対（はんたい）」だよ。「賛成」はよいと思って同意すること、「反対」は反発して同意しないことだ。'},
  {type:'choice',cat:'類義語・対義語',kanji:'',q:'「簡単」の類義語はどれですか？',choices:['複雑','難しい','容易','大変'],ans:2,explain:'「簡単（かんたん）」の類義語は「容易（ようい）」だよ。どちらも「やさしい・たやすい」という意味だね。対義語は「困難（こんなん）」だよ。'},
  {type:'choice',cat:'類義語・対義語',kanji:'',q:'「失敗」の対義語はどれですか？',choices:['無駄','間違い','成功','挑戦'],ans:2,explain:'「失敗（しっぱい）」の対義語は「成功（せいこう）」だよ。「失敗」はうまくいかなかったこと、「成功」はうまくいったことだ。'},
  // ===== 文章読解 =====
  {type:'choice',cat:'読解',kanji:'',q:'文章を読んで要点をまとめるとき、いちばん大切なのはどれですか？',choices:['長く書くこと','筆者の意見や中心となる考えを見つけること','全部の文を写すこと','自分の感想を入れること'],ans:1,explain:'要点をまとめるときは「筆者（書いた人）が最も伝えたいことは何か」を探すことが大切だよ。「つまり・まとめると・大切なのは」などの言葉の後に要点が来ることが多いんだ。'},
  {type:'choice',cat:'読解',kanji:'',q:'説明文の文章構成として正しいのはどれですか？',choices:['結論→理由→具体例→まとめ','はじめ（問いかけ）→なか（説明・理由）→おわり（まとめ）','感想→できごと→結論','むすび→はじめ→なか'],ans:1,explain:'説明文は「はじめ（問いかけ・話題提示）→なか（説明・理由・具体例）→おわり（まとめ・結論）」という構成になっていることが多いよ。'},
  {type:'choice',cat:'読解',kanji:'',q:'「接続語」の働きとして正しいのはどれですか？',choices:['文の主語を表す','文と文の関係をつなぐ','文末を変える','主語を省略する'],ans:1,explain:'「しかし・だから・また・つまり」などの接続語は「文と文の関係をつなぐ」働きをしているよ。「しかし＝逆のことを言う」「だから＝原因と結果」などの意味があるんだ。'},
  {type:'choice',cat:'読解',kanji:'',q:'物語文で「登場人物の気持ち」を読み取るときに参考にするものはどれですか？',choices:['ページ数','登場人物の言葉・行動・様子','作者の名前','絵やさし絵'],ans:1,explain:'物語で人物の気持ちを読み取るには「言葉（セリフ）」「行動（何をしたか）」「様子（表情や態度）」が大きなヒントになるよ。これらをよく読むと気持ちがわかるんだ。'},
  {type:'choice',cat:'読解',kanji:'',q:'「比喩（ひゆ）」とは何ですか？',choices:['反対のことを言う','別のものに例えて表現する','同じことを繰り返す','詳しく説明する'],ans:1,explain:'「比喩（ひゆ）」はあるものを別のものに例えて表現する技法だよ。「まるで〜のようだ（直喩）」「〜だ（隠喩）」などがあるんだ。「彼女の声は鈴のようだ」などが直喩の例だよ。'},
  {type:'choice',cat:'読解',kanji:'',q:'「段落（だんらく）」の役割は何ですか？',choices:['文字数を増やす','内容のまとまりを示す','ページを変える','段落は意味がない'],ans:1,explain:'「段落」は内容のまとまりを示すために文章を区切ったものだよ。段落が変わるときに話題や内容が変わることが多いんだ。段落のはじめは1文字分下げて書くよ。'},
  // ===== 敬語 =====
  {type:'choice',cat:'敬語',kanji:'',q:'「食べる」の尊敬語はどれですか？',choices:['いただく','めしあがる','たべられる','くださる'],ans:1,explain:'「食べる」の尊敬語は「めしあがる」だよ。「先生はもうめしあがりましたか？」のように使うんだ。「いただく」は謙譲語（自分がへりくだる言葉）だよ。'},
  {type:'choice',cat:'敬語',kanji:'',q:'「言う」の謙譲語はどれですか？',choices:['おっしゃる','申す','言われる','言います'],ans:1,explain:'「言う」の謙譲語は「申す（もうす）」だよ。「私は〇〇と申します」のように自分がへりくだって使う言葉なんだ。「おっしゃる」は尊敬語だよ。'},
  {type:'choice',cat:'敬語',kanji:'',q:'「来る」の尊敬語はどれですか？',choices:['まいる','いらっしゃる','きます','こられる'],ans:1,explain:'「来る」の尊敬語は「いらっしゃる」だよ。「先生がいらっしゃいました」のように使うんだ。「まいる」は謙譲語で「私がまいります」のように使うよ。'},
  {type:'choice',cat:'敬語',kanji:'',q:'「する」の謙譲語はどれですか？',choices:['なさる','される','いたす','します'],ans:2,explain:'「する」の謙譲語は「いたす」だよ。「ご説明いたします」のように自分の動作をへりくだって表現する言葉なんだ。「なさる」は尊敬語だよ。'},
  // ===== 熟語・漢字の成り立ち =====
  {type:'choice',cat:'熟語',kanji:'',q:'「日本語・英語・中国語」の「語」はどんな意味で使われていますか？',choices:['語る','言葉・ことば','物語','単語'],ans:1,explain:'「日本語・英語・中国語」の「語」は「言葉・ことば」という意味で使われているよ。「〇〇語」は「〇〇の言語」を表しているんだ。'},
  {type:'choice',cat:'熟語',kanji:'',q:'「自動車・自転車・自由」の「自」はどんな意味で使われていますか？',choices:['自分・みずから','じどう','くるま','うごく'],ans:0,explain:'「自動車・自転車・自由」の「自」は「自分・みずから」という意味だよ。「自動」は「自分で動く」、「自由」は「自分の思うように」という意味なんだ。'},
  {type:'choice',cat:'熟語',kanji:'',q:'「上下・左右・前後」のような漢字の組み合わせを何といいますか？',choices:['同義語熟語','類義語熟語','対義語熟語','同音熟語'],ans:2,explain:'「上下・左右・前後」は反対の意味を持つ漢字を組み合わせた「対義語熟語（たいぎごじゅくご）」だよ。このような熟語は意味が相対するものが多いんだ。'},
  {type:'choice',cat:'熟語',kanji:'',q:'「山川（やまかわ）・日月（にちげつ）・天地（てんち）」はどんな熟語ですか？',choices:['反対の意味の漢字を組み合わせた熟語','似た意味の漢字を組み合わせた熟語','上の字が下の字を修飾する熟語','下の字が上の字の目的語になる熟語'],ans:0,explain:'「山川・日月・天地」は「反対や対になる意味の漢字を組み合わせた熟語」だよ。山と川、日と月、天と地はそれぞれ対になる言葉なんだ。'},
  {type:'choice',cat:'熟語',kanji:'',q:'「読書（どくしょ）・登山（とざん）・乗車（じょうしゃ）」はどんな熟語ですか？',choices:['反対の意味の漢字を組み合わせた熟語','上の字が下の字を修飾する熟語','動詞と目的語の組み合わせ','主語と述語の組み合わせ'],ans:2,explain:'「読書・登山・乗車」は「動作を表す漢字＋目的語を表す漢字」の組み合わせだよ。「読む＋書物＝読書」「登る＋山＝登山」「乗る＋車＝乗車」というつくりになっているんだ。'},
];

let questions=[], current=0, correct=0, points=0, answered=false, history=[];

function shuffle(arr){return [...arr].sort(()=>Math.random()-.5);}

function startQuiz(){
  questions=shuffle(ALL_QUESTIONS).slice(0,30);
  current=0;correct=0;points=0;answered=false;history=[];
  document.getElementById('startScreen').style.display='none';
  document.getElementById('quizArea').style.display='block';
  updateStatus();loadQuestion();
}

function updateStatus(){
  document.getElementById('correctCount').textContent=correct;
  document.getElementById('pointCount').textContent=points;
  document.getElementById('qProgress').textContent=current+'/30';
  document.getElementById('progressFill').style.width=(current/30*100)+'%';
}

function loadQuestion(){
  answered=false;
  const q=questions[current];
  document.getElementById('qNumLabel').textContent='第 '+(current+1)+' 問';
  document.getElementById('qTypeBadge').textContent=q.cat;
  document.getElementById('questionText').innerHTML=q.q;
  // 漢字ボックス
  const kb=document.getElementById('kanjiBox');
  if(q.kanji){kb.textContent=q.kanji;kb.style.display='block';}
  else{kb.style.display='none';}
  document.getElementById('feedbackArea').className='feedback';
  document.getElementById('feedbackArea').textContent='';
  document.getElementById('nextBtn').className='next-btn';
  document.getElementById('teachBtn').disabled=false;
  document.getElementById('teachBtn').textContent='🙋 おしえて！';
  document.getElementById('teachArea').className='teach-area';
  document.getElementById('teachArea').textContent='';
  document.getElementById('skipBtn').disabled=false;
  document.getElementById('backBtn').className=current>0?'back-btn show':'back-btn';

  const choicesArea=document.getElementById('choicesArea');
  const textInputArea=document.getElementById('textInputArea');

  if(q.type==='choice'){
    choicesArea.style.display='flex';textInputArea.style.display='none';
    const labels=['Ａ','Ｂ','Ｃ','Ｄ'];
    const idxs=shuffle([0,1,2,3]);
    choicesArea.innerHTML='';
    idxs.forEach((origIdx,i)=>{
      const btn=document.createElement('button');
      btn.className='choice-btn';
      btn.innerHTML='<span class="choice-label">'+labels[i]+'</span>'+q.choices[origIdx];
      btn.onclick=()=>selectChoice(origIdx,btn,q);
      choicesArea.appendChild(btn);
    });
  } else {
    choicesArea.style.display='none';textInputArea.style.display='flex';
    const inp=document.getElementById('textInput');
    inp.value='';inp.className='text-input';inp.disabled=false;
    document.getElementById('submitBtn').disabled=false;
    inp.onkeydown=(e)=>{if(e.key==='Enter')submitAnswer();};
    setTimeout(()=>inp.focus(),100);
  }
  const card=document.getElementById('quizCard');
  card.style.animation='none';card.offsetHeight;
  card.style.animation='cardIn .35s cubic-bezier(.4,0,.2,1)';
}

function selectChoice(origIdx,btn,q){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const wasCorrect=origIdx===q.ans;
  if(wasCorrect){
    btn.classList.add('correct');correct++;points+=Math.round(50/30*10)/10;
    showFeedback(true,'正解！ 🎉');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if(b.textContent.trim().includes(q.choices[q.ans]))b.classList.add('correct');
    });
    showFeedback(false,'不正解。正しい答えは「'+q.choices[q.ans]+'」だよ。');
  }
  history.push({q:current,correct:wasCorrect,pts:wasCorrect?Math.round(50/30*10)/10:0});
  updateStatus();
  document.getElementById('teachBtn').disabled=true;
  document.getElementById('skipBtn').disabled=true;
  document.getElementById('backBtn').className='back-btn';
  document.getElementById('nextBtn').className='next-btn show';
}

function submitAnswer(){
  if(answered)return;
  const q=questions[current];
  const inp=document.getElementById('textInput');
  const val=inp.value.trim();
  if(!val)return;
  answered=true;inp.disabled=true;
  document.getElementById('submitBtn').disabled=true;
  const norm=val.replace(/\s/g,'');
  const isCorrect=q.ans.some(a=>a.replace(/\s/g,'')==norm);
  if(isCorrect){
    inp.classList.add('correct');correct++;points+=Math.round(50/30*10)/10;
    showFeedback(true,'正解！ 🎉');
  } else {
    inp.classList.add('wrong');
    showFeedback(false,'不正解。正しい答えは「'+q.ans[0]+'」だよ。');
  }
  history.push({q:current,correct:isCorrect,pts:isCorrect?Math.round(50/30*10)/10:0});
  updateStatus();
  document.getElementById('teachBtn').disabled=true;
  document.getElementById('skipBtn').disabled=true;
  document.getElementById('backBtn').className='back-btn';
  document.getElementById('nextBtn').className='next-btn show';
}

function skipQuestion(){
  if(answered)return;
  answered=true;
  history.push({q:current,correct:false,pts:0,skipped:true});
  document.getElementById('skipBtn').disabled=true;
  document.getElementById('teachBtn').disabled=true;
  document.getElementById('backBtn').className='back-btn';
  const fb=document.getElementById('feedbackArea');
  fb.textContent='⏭ スキップしました。';
  fb.className='feedback show wrong-fb';
  document.getElementById('nextBtn').className='next-btn show';
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const inp=document.getElementById('textInput');
  if(inp)inp.disabled=true;
  document.getElementById('submitBtn').disabled=true;
}

function goBack(){
  if(current===0)return;
  const last=history.pop();
  if(last&&last.correct){correct--;points-=last.pts;}
  current--;updateStatus();loadQuestion();
}

function showTeach(){
  const q=questions[current];
  document.getElementById('teachArea').textContent='📖 '+q.explain;
  document.getElementById('teachArea').className='teach-area show';
  document.getElementById('teachBtn').textContent='📖 解説を見た！';
  document.getElementById('teachBtn').disabled=true;
}

function showFeedback(isCorrect,msg){
  const fb=document.getElementById('feedbackArea');
  fb.textContent=(isCorrect?'⭕ ':'❌ ')+msg;
  fb.className='feedback show '+(isCorrect?'correct-fb':'wrong-fb');
}

function nextQuestion(){
  current++;
  if(current>=30){showResult();}else{updateStatus();loadQuestion();}
}

function saveRecord(correct,pts){
  const records=JSON.parse(localStorage.getItem('kokugo_history')||'[]');
  const now=new Date();
  const dateStr=(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  records.unshift({date:dateStr,correct,pts});
  if(records.length>20)records.pop();
  localStorage.setItem('kokugo_history',JSON.stringify(records));
}

function loadHistory(){
  const records=JSON.parse(localStorage.getItem('kokugo_history')||'[]');
  const list=document.getElementById('historyList');
  if(records.length===0){list.innerHTML='<div class="history-empty">まだ記録がありません</div>';return;}
  const total=records.reduce((s,r)=>s+r.pts,0);
  list.innerHTML=records.map(rec=>'<div class="history-item"><span class="history-date">'+rec.date+'</span><span class="history-score">'+rec.correct+'/30問</span><span class="history-pts">＋'+rec.pts+'pt</span></div>').join('')
    +'<div class="history-item" style="background:#fef3c7;margin-top:4px;"><span class="history-date" style="color:#92400e;">🏆 合計ポイント</span><span class="history-score" style="color:#b45309;">'+Math.round(total*10)/10+' pt</span></div>';
}

function clearHistory(){
  if(!confirm('記録をすべて消しますか？'))return;
  localStorage.removeItem('kokugo_history');
  loadHistory();
}

function showResult(){
  document.getElementById('quizArea').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const perfect=correct===30;
  document.getElementById('resultTrophy').textContent=perfect?'🏆':correct>=20?'🌟':'📖';
  document.getElementById('resultTitle').textContent=perfect?'パーフェクト！！':correct>=20?'よくできました！':'もう一度挑戦しよう！';
  document.getElementById('resultScore').innerHTML='30問中 <strong>'+correct+'問</strong> 正解';
  const pts=perfect?50:Math.floor(correct/30*50);
  document.getElementById('pointBadge').textContent='＋'+pts+' ポイント！';
  document.getElementById('pointNote').textContent=perfect?'全問正解で満点ボーナス50ポイント獲得！':'正解数に応じて '+pts+' ポイントゲット！全問正解で50ポイントに挑戦しよう！';
  saveRecord(correct,pts);
  const records=JSON.parse(localStorage.getItem('kokugo_history')||'[]');
  const total=Math.round(records.reduce((s,r)=>s+r.pts,0)*10)/10;
  document.getElementById('totalPtNote').textContent='🏆 これまでの合計：'+total+' ポイント！';
}

function restartQuiz(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
  loadHistory();
}

window.addEventListener('load',loadHistory);
</script>
